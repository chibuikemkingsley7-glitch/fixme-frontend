<!DOCTYPE html>
<html>
<head>
  <title>FixMe</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }
    button {
      padding: 10px;
      margin: 5px;
      width: 95%;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>FixMe 💈</h1>

<div class="box">
  <h3>Create Account</h3>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
</div>

<div class="box">
  <h3>Login</h3>
  <button onclick="login()">Login</button>
</div>

<div class="box">
  <h3>Choose Service</h3>
  <button onclick="getWorkers('Hairdresser')">Hairdresser</button>
  <button onclick="getWorkers('Barber')">Barber</button>
</div>

<div class="box">
  <h3>Available Workers</h3>
  <div id="workers"></div>
</div>

<script>
const API = "https://fixme-backend-1.onrender.com";

function signup(){
  fetch(API+"/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:document.getElementById("email").value,
      password:document.getElementById("password").value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
  });
}

function login(){
  fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:document.getElementById("email").value,
      password:document.getElementById("password").value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
  });
}

function getWorkers(type){
  fetch(API+"/workers?type="+type)
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(w=>{
      html+=`<p><b>${w.name}</b><br>${w.exp}<br>₦${w.price}
      <br><button onclick="book(${w.id},${w.price})">Book</button></p>`;
    });
    document.getElementById("workers").innerHTML=html;
  });
}

function book(id,price){
  fetch(API+"/book",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      workerId:id,
      location:"User location",
      price:price
    })
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
  });
}
</script>

</body>
</html>
