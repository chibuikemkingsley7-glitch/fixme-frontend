<!DOCTYPE html>
<html>
<head>
  <title>FixMe 💈</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {font-family:'Segoe UI', Tahoma, sans-serif; margin:0; padding:0; background:#f0f2f5;}
    header {background:#000; color:white; padding:15px; text-align:center; font-size:24px;}
    .container {width:90%; max-width:450px; margin:20px auto;}
    .card {background:white; padding:20px; margin:10px 0; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.1);}
    input, select {width:90%; padding:10px; margin:5px 0; border-radius:5px; border:1px solid #ccc;}
    button {padding:12px; margin:8px 0; background:#000; color:white; border:none; border-radius:8px; width:100%;}
    button:hover {background:#333;}
    .star {color:purple;}
  </style>
</head>
<body>

<header>FixMe 💈</header>

<!-- Landing -->
<div class="container" id="roleSelect">
  <div class="card">
    <h2>Welcome</h2>
    <button onclick="selectRole('customer')">Customer</button>
    <button onclick="selectRole('agent')">Register Agent</button>
  </div>
</div>

<!-- Auth -->
<div class="container" id="authSection" style="display:none;">
  <div class="card">
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <p id="message"></p>
  </div>
</div>

<!-- Dashboard -->
<div class="container" id="dashboard" style="display:none;">
  <div class="card">
    <h3>Select Service</h3>
    <button onclick="chooseService('hairdresser')">Hairdresser</button>
    <button onclick="chooseService('barber')">Barber</button>
  </div>
</div>

<!-- Agents -->
<div class="container" id="workersSection" style="display:none;">
  <p id="loading"></p>
  <div id="workers"></div>
</div>

<!-- Experience -->
<div class="container" id="experienceSection" style="display:none;">
  <div class="card">
    <h3>Select Experience</h3>
    <button onclick="finalBook(4000)">1–3 yrs → ₦4,000</button>
    <button onclick="finalBook(8000)">3–6 yrs → ₦8,000</button>
    <button onclick="finalBook(15000)">6–10 yrs → ₦15,000</button>
    <button onclick="finalBook(25000)">10+ yrs → ₦25,000</button>
  </div>
</div>

<!-- Booking -->
<div class="container" id="bookingBox" style="display:none;">
  <div class="card">
    <h3>Booking Confirmed ✅</h3>
    <p id="bookingDetails"></p>
  </div>
</div>

<!-- Agent -->
<div class="container" id="agentSection" style="display:none;">
  <div class="card">
    <input id="agentName" placeholder="Name"><br>
    <input id="agentEmail" placeholder="Email"><br>
    <input id="agentPassword" type="password"><br>
    <input id="agentAddress" placeholder="Address"><br>

    <select id="serviceType">
      <option value="">Service</option>
      <option value="hairdresser">Hairdresser</option>
      <option value="barber">Barber</option>
    </select><br>

    <input id="experienceYears" type="number" placeholder="Years"><br>

    <input type="file" id="profilePic"><br>
    <input type="file" id="kitPic"><br>

    <label>Purple Star</label>
    <input type="checkbox" id="purpleStar"><br>

    <button onclick="registerAgent()">Submit</button>
  </div>
</div>

<script>
const API = "https://fixme-backend-3.onrender.com"; // ✅ correct one

let selectedAgentId = "";

// Role
function selectRole(role){
  roleSelect.style.display="none";
  if(role==="customer"){
    authSection.style.display="block";
  } else {
    agentSection.style.display="block";
  }
}

// Signup
function signup(){
  fetch(API+"/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,password:password.value})
  })
  .then(res=>res.json())
  .then(d=>{
    alert(d.message);
    authSection.style.display="none";
    dashboard.style.display="block";
  });
}

// Login
async function login(){
  message.innerText="Logging in...";

  try{
    const res=await fetch(API+"/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:email.value,password:password.value})
    });

    const d=await res.json();
    message.innerText=d.message;

    if(d.message==="Logged in"){
      authSection.style.display="none";
      dashboard.style.display="block";
    }
  }catch{
    message.innerText="Error ❌";
  }
}

// Fetch agents
function chooseService(service){
  dashboard.style.display="none";
  workersSection.style.display="block";
  loading.innerText="Loading...";

  fetch(API+"/agents?service="+service)
  .then(res=>res.json())
  .then(data=>{
    loading.innerText="";

    if(data.length===0){
      workers.innerHTML="<p>No agents found ❌</p>";
      return;
    }

    let html="";
    data.forEach(agent=>{
      html+=`
      <div class="card">
        <h3>${agent.name}</h3>
        <p>${agent.experience} years</p>
        <button onclick="selectAgent('${agent._id}')">Book</button>
      </div>`;
    });

    workers.innerHTML=html;
  });
}

// Select agent
function selectAgent(id){
  selectedAgentId=id;
  workersSection.style.display="none";
  experienceSection.style.display="block";
}

// Book
function finalBook(price){
  fetch(API+"/book",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      agentId:selectedAgentId,
      price:price,
      location:"Lagos"
    })
  })
  .then(res=>res.json())
  .then(()=>{
    experienceSection.style.display="none";
    bookingBox.style.display="block";
    bookingDetails.innerHTML="Price: ₦"+price;
  });
}

// Register agent
function registerAgent(){
  const fd=new FormData();
  fd.append("name",agentName.value);
  fd.append("email",agentEmail.value);
  fd.append("password",agentPassword.value);
  fd.append("address",agentAddress.value);
  fd.append("service",serviceType.value);
  fd.append("experience",experienceYears.value);
  fd.append("profilePic",profilePic.files[0]);
  fd.append("kitPic",kitPic.files[0]);
  fd.append("purpleStar",purpleStar.checked);

  fetch(API+"/registerAgent",{method:"POST",body:fd})
  .then(res=>res.json())
  .then(()=>{
    alert("Submitted ✅");
  });
}
</script>

</body>
</html>
