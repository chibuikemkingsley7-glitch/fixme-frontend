<!DOCTYPE html>
<html>
<head>
  <title>FixMe 💈</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {font-family:'Segoe UI', Tahoma, sans-serif; margin:0; padding:0; background:#f0f2f5;}
    header {background:#000; color:white; padding:15px; text-align:center; font-size:24px; font-weight:bold;}
    .container {width:90%; max-width:450px; margin:20px auto;}
    .card {background:white; padding:20px; margin:10px 0; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.1);}
    input, select {width:90%; padding:10px; margin:5px 0; border-radius:5px; border:1px solid #ccc;}
    button {padding:12px; margin:8px 0; background:#000; color:white; border:none; border-radius:8px; cursor:pointer; width:100%; font-size:16px;}
    button:hover {background:#333;}
    h2,h3 {margin:5px 0;}
    .star {color:purple; font-size:18px;}
  </style>
</head>
<body>

<header>FixMe 💈</header>

<!-- Landing -->
<div class="container" id="roleSelect">
  <div class="card">
    <h2>Welcome to FixMe</h2>
    <button onclick="selectRole('customer')">I am a Customer</button>
    <button onclick="selectRole('agent')">Register as Agent</button>
  </div>
</div>

<!-- Auth -->
<div class="container" id="authSection" style="display:none;">
  <div class="card">
    <h3>Create Account</h3>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="signup()">Sign Up</button>
  </div>

  <div class="card">
    <h3>Login</h3>
    <button onclick="login()">Login</button>
    <p id="message"></p>
  </div>
</div>

<!-- Dashboard -->
<div class="container" id="dashboard" style="display:none;">
  <div class="card">
    <h2>Choose Service</h2>
    <button onclick="chooseService('Hairdresser')">Hairdresser</button>
    <button onclick="chooseService('Barber')">Barber</button>
  </div>
</div>

<!-- Agents -->
<div class="container" id="workersSection" style="display:none;">
  <div id="workers"></div>
</div>

<!-- Experience Selection -->
<div class="container" id="experienceSection" style="display:none;">
  <div class="card">
    <h3>Select Experience Level</h3>

    <button onclick="finalBook(4000)">1–3 years → ₦4,000</button>
    <button onclick="finalBook(8000)">3–6 years → ₦8,000</button>
    <button onclick="finalBook(15000)">6–10 years → ₦15,000</button>
    <button onclick="finalBook(25000)">10+ years → ₦25,000</button>

  </div>
</div>

<!-- Booking -->
<div class="container" id="bookingBox" style="display:none;">
  <div class="card">
    <h3>Booking Confirmed ✅</h3>
    <p id="bookingDetails"></p>
  </div>
</div>

<!-- Agent Registration -->
<div class="container" id="agentSection" style="display:none;">
  <div class="card">
    <h3>Register as Agent</h3>
    <input id="agentName" placeholder="Full Name"><br>
    <input id="agentEmail" placeholder="Email"><br>
    <input id="agentPassword" type="password" placeholder="Password"><br>
    <input id="agentAddress" placeholder="Address"><br>

    <select id="serviceType">
      <option value="">Select Service</option>
      <option value="Hairdresser">Hairdresser</option>
      <option value="Barber">Barber</option>
    </select><br>

    <input id="experienceYears" type="number" placeholder="Experience in years"><br>

    <input type="file" id="profilePic"><br>
    <input type="file" id="kitPic"><br>

    <label>Purple Star</label>
    <input type="checkbox" id="purpleStar"><br>

    <button onclick="registerAgent()">Submit</button>
  </div>
</div>

<script>
const API = "https://fixme-backend-1.onrender.com";

let selectedAgentId = "";

// Role
function selectRole(role){
  roleSelect.style.display="none";
  if(role==='customer'){
    authSection.style.display="block";
  } else {
    agentSection.style.display="block";
  }
}

// Signup
function signup(){
  fetch(API+"/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
    authSection.style.display="none";
    dashboard.style.display="block";
  });
}

// Login
async function login(){
  message.innerText="Logging in... ⏳";

  try{
    const res=await fetch(API+"/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        email:email.value,
        password:password.value
      })
    });

    const data=await res.json();
    message.innerText=data.message;

    if(data.message==="Logged in"){
      authSection.style.display="none";
      dashboard.style.display="block";
    }

  }catch(err){
    message.innerText="Server error ❌";
  }
}

// Choose Service
function chooseService(service){
  dashboard.style.display="none";
  workersSection.style.display="block";

  fetch(API+"/agents?service="+service)
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(agent=>{
      html+=`
      <div class="card">
        <h3>${agent.name} ${agent.purpleStar?"<span class='star'>⭐</span>":""}</h3>
        <p>${agent.experience} years experience</p>
        <button onclick="selectAgent('${agent._id}')">Book</button>
      </div>`;
    });
    workers.innerHTML=html;
  });
}

// Select Agent
function selectAgent(id){
  selectedAgentId = id;
  workersSection.style.display="none";
  experienceSection.style.display="block";
}

// Final Booking
function finalBook(price){
  fetch(API+"/book",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      agentId:selectedAgentId,
      price:price,
      location:"Lagos"
    })
  })
  .then(res=>res.json())
  .then(()=>{
    experienceSection.style.display="none";
    bookingBox.style.display="block";
    bookingDetails.innerHTML="Booking successful ✅<br>Price: ₦"+price;
  });
}

// Register Agent
function registerAgent(){
  const formData=new FormData();
  formData.append("name",agentName.value);
  formData.append("email",agentEmail.value);
  formData.append("password",agentPassword.value);
  formData.append("address",agentAddress.value);
  formData.append("service",serviceType.value);
  formData.append("experience",experienceYears.value);
  formData.append("profilePic",profilePic.files[0]);
  formData.append("kitPic",kitPic.files[0]);
  formData.append("purpleStar",purpleStar.checked);

  fetch(API+"/registerAgent",{method:"POST",body:formData})
  .then(res=>res.json())
  .then(()=>{
    alert("Submitted for verification");
  });
}
</script>

</body>
</html>
