<!DOCTYPE html>
<html>
<head>
  <title>FixMe 💈</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {font-family:'Segoe UI', Tahoma, sans-serif; margin:0; background:#f0f2f5;}
    header {background:#000; color:white; padding:15px; text-align:center; font-size:22px;}
    .container {width:90%; max-width:450px; margin:20px auto;}
    .card {background:white; padding:15px; margin:10px 0; border-radius:10px;}
    input, select {width:100%; padding:10px; margin:5px 0;}
    button {width:100%; padding:12px; margin-top:8px; background:black; color:white; border:none; border-radius:6px;}
    img {width:70px; margin:5px; border-radius:10px;}
    .star {color:purple;}
  </style>
</head>

<body>

<header>FixMe 💈</header>

<!-- ROLE -->
<div class="container" id="roleSelect">
  <div class="card">
    <h3>Welcome</h3>
    <button onclick="selectRole('customer')">Customer</button>
    <button onclick="selectRole('agent')">Become Agent</button>
  </div>
</div>

<!-- AUTH -->
<div class="container" id="authSection" style="display:none;">
  <div class="card">
    <h3>Signup</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Signup</button>
  </div>

  <div class="card">
    <h3>Login</h3>
    <button onclick="login()">Login</button>
    <p id="message"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard" style="display:none;">
  <div class="card">
    <h3>Select Service</h3>
    <button onclick="chooseService('barber')">Barber</button>
    <button onclick="chooseService('hairdresser')">Hairdresser</button>
  </div>
</div>

<!-- AGENTS -->
<div class="container" id="workersSection" style="display:none;">
  <div id="workers"></div>
</div>

<!-- EXPERIENCE -->
<div class="container" id="experienceSection" style="display:none;">
  <div class="card">
    <h3>Select Price</h3>
    <button onclick="finalBook(4000)">₦4,000</button>
    <button onclick="finalBook(8000)">₦8,000</button>
    <button onclick="finalBook(15000)">₦15,000</button>
    <button onclick="finalBook(25000)">₦25,000</button>
  </div>
</div>

<!-- BOOKING -->
<div class="container" id="bookingBox" style="display:none;">
  <div class="card">
    <h3>Success ✅</h3>
    <p id="bookingDetails"></p>
  </div>
</div>

<!-- AGENT REGISTER -->
<div class="container" id="agentSection" style="display:none;">
  <div class="card">
    <h3>Register Agent</h3>

    <input id="agentName" placeholder="Name">
    <input id="agentEmail" placeholder="Email">
    <input id="agentPassword" type="password" placeholder="Password">
    <input id="agentAddress" placeholder="Address">

    <select id="serviceType">
      <option value="">Select</option>
      <option value="barber">Barber</option>
      <option value="hairdresser">Hairdresser</option>
    </select>

    <input id="experienceYears" placeholder="Experience">

    <input type="file" id="profilePic">
    <input type="file" id="kitPic">

    <label>Purple Star</label>
    <input type="checkbox" id="purpleStar">

    <button onclick="registerAgent()">Submit</button>
  </div>
</div>

<script>

const API = "https://fixme-backend-3.onrender.com";
let selectedAgentId = "";

// ROLE
function selectRole(role){
  roleSelect.style.display="none";
  if(role==="customer"){
    authSection.style.display="block";
  } else {
    agentSection.style.display="block";
  }
}

// SIGNUP
function signup(){
  fetch(API+"/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
    authSection.style.display="none";
    dashboard.style.display="block";
  });
}

// LOGIN
async function login(){
  message.innerText="Logging in...";

  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();
  message.innerText=data.message;

  if(data.message==="Logged in"){
    authSection.style.display="none";
    dashboard.style.display="block";
  }
}

// 🔥 CHOOSE SERVICE (THIS IS THE FIXED PART)
function chooseService(service){
  dashboard.style.display="none";
  workersSection.style.display="block";

  fetch(API+"/agents?service="+service)
  .then(res=>res.json())
  .then(data=>{
    let html="";

    if(data.length === 0){
      html = "<p>No agents available</p>";
    }

    data.forEach(agent=>{
      html += `
      <div class="card">
        <h3>
          ${agent.name}
          ${agent.purpleStar ? "<span class='star'>⭐</span>" : ""}
        </h3>

        <p>${agent.experience} years experience</p>

        ${agent.profilePicUrl ? `<img src="${agent.profilePicUrl}">` : ""}
        ${agent.kitPicUrl ? `<img src="${agent.kitPicUrl}">` : ""}

        <button onclick="selectAgent('${agent._id}')">Book</button>
      </div>`;
    });

    workers.innerHTML = html;
  })
  .catch(()=>{
    workers.innerHTML = "Error loading agents ❌";
  });
}

// SELECT AGENT
function selectAgent(id){
  selectedAgentId = id;
  workersSection.style.display="none";
  experienceSection.style.display="block";
}

// BOOK
function finalBook(price){
  fetch(API+"/book",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      agentId:selectedAgentId,
      price:price,
      location:"Lagos"
    })
  })
  .then(res=>res.json())
  .then(()=>{
    experienceSection.style.display="none";
    bookingBox.style.display="block";
    bookingDetails.innerHTML="Booked ✅ ₦"+price;
  });
}

// REGISTER AGENT
function registerAgent(){
  const formData = new FormData();

  formData.append("name",agentName.value);
  formData.append("email",agentEmail.value);
  formData.append("password",agentPassword.value);
  formData.append("address",agentAddress.value);
  formData.append("service",serviceType.value);
  formData.append("experience",experienceYears.value);
  formData.append("profilePic",profilePic.files[0]);
  formData.append("kitPic",kitPic.files[0]);
  formData.append("purpleStar",purpleStar.checked);

  fetch(API+"/registerAgent",{method:"POST",body:formData})
  .then(res=>res.json())
  .then(()=>{
    alert("Submitted ✅");
  });
}

</script>

</body>
</html>
