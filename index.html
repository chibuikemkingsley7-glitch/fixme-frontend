<!DOCTYPE html>
<html>
<head>
  <title>FixMe 💈</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {font-family:'Segoe UI', Tahoma, sans-serif; margin:0; padding:0; background:#f0f2f5;}
    header {background:#000; color:white; padding:15px; text-align:center; font-size:24px; font-weight:bold;}
    .container {width:90%; max-width:400px; margin:20px auto;}
    .card {background:white; padding:20px; margin:10px 0; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.1);}
    input {width:90%; padding:10px; margin:5px 0; border-radius:5px; border:1px solid #ccc;}
    button {padding:10px 15px; margin:5px 0; background:#000; color:white; border:none; border-radius:5px; cursor:pointer; width:95%; font-size:16px;}
    button:hover {background:#333;}
    h2,h3 {margin:5px 0;}
  </style>
</head>
<body>

<header>FixMe 💈</header>

<div class="container" id="roleSelect">
  <div class="card">
    <h2>Welcome to FixMe</h2>
    <button onclick="selectRole('customer')">I am a Customer</button>
    <button onclick="selectRole('agent')">Register as Agent</button>
  </div>
</div>

<!-- Customer Auth -->
<div class="container" id="authSection" style="display:none;">
  <div class="card">
    <h3>Create Account</h3>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="signup()">Sign Up</button>
  </div>

  <div class="card">
    <h3>Login</h3>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- Dashboard for Customer -->
<div class="container" id="dashboard" style="display:none;">
  <div class="card">
    <h2>Choose Service</h2>
    <button onclick="chooseService('Hairdresser')">Hairdresser</button>
    <button onclick="chooseService('Barber')">Barber</button>
  </div>
</div>

<!-- Experience level selection -->
<div class="container" id="experienceSection" style="display:none;">
  <div class="card">
    <h2>Choose Experience Level</h2>
    <div id="experienceOptions"></div>
  </div>
</div>

<!-- Booking Confirmation -->
<div class="container" id="bookingBox" style="display:none;">
  <div class="card">
    <h3>Booking Confirmed ✅</h3>
    <p id="bookingDetails"></p>
  </div>
</div>

<script>
const API = "https://fixme-backend-1.onrender.com";
let selectedService = "";

// Role selection
function selectRole(role){
  document.getElementById("roleSelect").style.display = "none";
  if(role==='customer'){
    document.getElementById("authSection").style.display = "block";
  } else {
    alert("Agent registration page (not implemented yet)");
  }
}

// Signup/Login
function signup(){
  fetch(API+"/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:document.getElementById("email").value,password:document.getElementById("password").value})
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
    document.getElementById("authSection").style.display="none";
    document.getElementById("dashboard").style.display="block";
  });
}

function login(){
  fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:document.getElementById("email").value,password:document.getElementById("password").value})
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
    document.getElementById("authSection").style.display="none";
    document.getElementById("dashboard").style.display="block";
  });
}

// Choose service
function chooseService(service){
  selectedService = service;
  document.getElementById("dashboard").style.display="none";
  document.getElementById("experienceSection").style.display="block";
  
  const options = [
    {exp:"1-3 years", price:4000, duration:"2 hours"},
    {exp:"3-6 years", price:8000, duration:"2 hours"},
    {exp:"6-10 years", price:15000, duration:"2 hours"},
    {exp:"10+ years", price:25000, duration:"2 hours"}
  ];
  
  let html="";
  options.forEach((opt,i)=>{
    html+=`<div class="card">
      <h3>${opt.exp}</h3>
      <p>₦${opt.price} for 1 person</p>
      <p>Duration: ${opt.duration}</p>
      <button onclick="book('${selectedService}','${opt.exp}',${opt.price},'${opt.duration}')">Book</button>
    </div>`;
  });
  document.getElementById("experienceOptions").innerHTML=html;
}

// Book function
function book(service,exp,price,duration){
  fetch(API+"/book",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({service:service,exp:exp,price:price,duration:duration,location:"User location"})
  })
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("experienceSection").style.display="none";
    document.getElementById("bookingBox").style.display="block";
    document.getElementById("bookingDetails").innerHTML=
      `Service: ${service}<br>Experience: ${exp}<br>Price: ₦${price}<br>Duration: ${duration}`;
  });
}
</script>

</body>
</html>
